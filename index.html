<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TV Election Results</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #111;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  z-index: 10000;
}

/* TICKER */
.ticker {
  overflow: hidden;
  white-space: nowrap;
  background: black;
  padding: 8px 0;
}
.ticker-text {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 15s linear infinite;
}
@keyframes scrollText {
  100% { transform: translateX(-100%); }
}

/* LEADER CARD */
.leader-card {
  position: relative;
  margin: 20px auto;
  padding: 20px;
  border-radius: 18px;
  max-width: 500px;
  overflow: hidden;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  to { box-shadow: 0 0 40px rgba(255,255,255,0.6); }
}

.vote-count {
  animation: countPulse 2s infinite;
  font-weight: bold;
}
@keyframes countPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.bg {
  position: absolute;
  inset: 0;
  opacity: 0.25;
  background-size: 200% 200%;
  animation: flagMove 6s linear infinite;
}
@keyframes flagMove {
  100% { background-position: 100% 50%; }
}

.live-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); }
}

.leader-content {
  text-align: center;
  position: relative;
}

.leader-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid white;
}

.margin-box {
  margin-top: 10px;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  animation: marginPulse 1.5s infinite;
}

@keyframes marginPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* LIST */
.container { max-width: 600px; margin: auto; }
.card { margin: 15px 0; padding: 10px; border-radius: 12px; }
.top-candidate { box-shadow: 0 0 15px gold; }

.label {
  display: flex;
  align-items: center;
  gap: 10px;
}
.label img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}
.rank { color: gold; }

.percent-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.2);
  padding: 2px 8px;
  border-radius: 10px;
  animation: pulsePercent 2s infinite;
}
@keyframes pulsePercent {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.bar {
  height: 24px;
  border-radius: 10px;
  margin-top: 6px;
  transform: scaleX(0);
  transform-origin: left;
  animation: growBar 1s forwards, glowBar 2s infinite alternate;
}
@keyframes growBar {
  to { transform: scaleX(1); }
}
@keyframes glowBar {
  from { box-shadow: 0 0 5px currentColor; }
  to { box-shadow: 0 0 20px currentColor; }
}

/* WINNER OVERLAY */
.winner-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,0,0,0.8), black);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.hidden { display: none; }

.winner-box {
  text-align: center;
  animation: zoomIn 0.8s ease;
}
@keyframes zoomIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.winner-title {
  font-size: 28px;
  color: gold;
}

.winner-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid gold;
  margin: 10px 0;
}

.winner-name {
  font-size: 26px;
  font-weight: bold;
}
</style>
</head>

<body>

<button id="musicBtn">🔊 Music</button>

<h2 style="text-align:center;">📊 Live Election Results</h2>

<div class="ticker">
  <div class="ticker-text">Loading...</div>
</div>

<p id="totalVotes" style="text-align:center;"></p>
<div id="app"></div>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="bg-music.mp3" type="audio/mpeg">
</audio>

<!-- 🏆 WINNER MUSIC -->
<audio id="winnerSound">
  <source src="winner.mp3" type="audio/mpeg">
</audio>

<!-- WINNER OVERLAY -->
<div id="winnerOverlay" class="winner-overlay hidden">
  <div class="winner-box">
    <div class="winner-title">🏆 WINNER DECLARED</div>
    <img id="winnerImg" class="winner-img">
    <div id="winnerName" class="winner-name"></div>
    <div id="winnerParty"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const candidatesData = [
  { id:'stalin', nameEn:"M. K. Stalin", party:"DMK", color:"#E53935", photo:"https://tn-mock-election2026.netlify.app/assets/stalin-BL6kc50k.jpg", flagBg:"linear-gradient(to bottom,#d32f2f 50%,#000 50%)" },
  { id:'eps', nameEn:"E. K. Palaniswami", party:"AIADMK", color:"#43A047", photo:"https://tn-mock-election2026.netlify.app/assets/edapadi-Cc674AIS.jpg", flagBg:"linear-gradient(to bottom,#000 33%,#fff 33%,#fff 66%,#d32f2f 66%)" },
  { id:'vijay', nameEn:" Joseph Vijay.C", party:"TVK", color:"#F9A825", photo:"https://tn-mock-election2026.netlify.app/assets/vijay-BKFnhox8.jpg", flagBg:"linear-gradient(to bottom,#b71c1c 50%,#fbc02d 50%)" },
  { id:'seeman', nameEn:"Seeman", party:"NTK", color:"#FB8C00", photo:"https://tn-mock-election2026.netlify.app/assets/seeman-BKm8RPIs.jpeg", flagBg:"linear-gradient(to bottom,#D50000 100%)" },
  { id:'nota', nameEn:"NOTA", party:"None", color:"#9E9E9E", photo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/NOTA_symbol_India.png", flagBg:"#eee" }
];

let votes = { stalin:32, eps:15, vijay:239, seeman:42, nota:4 };
let winnerShown = false;

const bgMusic = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

// autoplay after click
document.body.addEventListener("click", () => {
  bgMusic.volume = 0.3;
  bgMusic.play().catch(()=>{});
}, { once: true });

// toggle
btn.onclick = () => {
  if (bgMusic.paused) {
    bgMusic.play();
    btn.innerText = "🔊 Music";
  } else {
    bgMusic.pause();
    btn.innerText = "🔇 Muted";
  }
};

function render() {
  const total = Object.values(votes).reduce((a,b)=>a+b,0);
  document.getElementById("totalVotes").innerText = `🗳 Total Votes: ${total}`;

  const merged = candidatesData.map(c => ({...c, votes:votes[c.id]}));
  const sorted = [...merged].sort((a,b)=>b.votes-a.votes);

  const leader = sorted[0];
  const second = sorted[1];
  const percent = ((leader.votes/total)*100).toFixed(1);
  const margin = leader.votes - second.votes;

  document.querySelector(".ticker-text").innerText =
    `🔴 LIVE: ${leader.nameEn} leading by ${margin} votes (${percent}%)`;

  document.getElementById("app").innerHTML = `
    <div class="leader-card" style="background:${leader.color}">
      <div class="bg" style="background:${leader.flagBg}"></div>
      <div class="live-badge">LIVE</div>
      <div class="leader-content">
        <img class="leader-img" src="${leader.photo}">
        <h3>🏆 ${leader.nameEn}</h3>
        <div>${leader.party}</div>
        <div class="vote-count">${leader.votes} votes • ${percent}%</div>
        <div class="margin-box" style="animation: marginPulse 1.5s infinite;">⚡ Leading by ${margin} votes</div>
      </div>
    </div>

    <div class="container">
      ${sorted.map((c,i)=>{
        const p = ((c.votes/total)*100).toFixed(1);
        return `
          <div class="card ${c.id===leader.id?'top-candidate':''}">
            <div class="label">
              <span class="rank">#${i+1}</span>
              <img src="${c.photo}">
              <span>${c.nameEn}</span>
              <span class="percent-badge">${p}%</span>
            </div>
            <div class="bar" style="width:${p}%; background:${c.color}"></div>
          </div>
        `;
      }).join("")}
    </div>
  `;

  // winner trigger
  if (!winnerShown && percent > 50) {
    winnerShown = true;

    bgMusic.pause();

    document.getElementById("winnerName").innerText = leader.nameEn;
    document.getElementById("winnerParty").innerText = leader.party;
    document.getElementById("winnerImg").src = leader.photo;

    document.getElementById("winnerOverlay").classList.remove("hidden");

    document.getElementById("winnerSound").play();
    confetti({ particleCount: 200, spread: 120 });

    setTimeout(()=>{
      document.getElementById("winnerOverlay").classList.add("hidden");
    },6000);
  }
}

render();

// No auto-update - percentages are fixed/stable
</script>

</body>
</html>
